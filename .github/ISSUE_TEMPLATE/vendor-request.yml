name: Vendor request
description: Suggest an Arab/MENA vendor, platform, API source, or market tool to add.
title: "Add vendor: "
labels: [vendor-request, needs-review]
body:
  - type: input
    id: vendor
    attributes:
      label: Vendor name
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - payments
        - bnpl
        - logistics
        - communications
        - e-invoicing/tax
        - commerce/POS/accounting
        - open banking
        - identity/government
        - HR/payroll
        - Arabic NLP
        - open data
        - marketing/sales
        - localization/content
        - operations
        - other Arab-market skill
    validations:
      required: true
  - type: textarea
    id: sources
    attributes:
      label: Official source URLs or public evidence
      description: Prefer developer portals, API docs, OpenAPI/Postman, SDK repos, government docs, first-party references, or clear public evidence.
    validations:
      required: true