name: Skill bug
description: Report a routing, safety, or source-backed behavior problem.
title: "Skill bug: "
labels: [skill-bug, needs-review]
body:
  - type: input
    id: skill
    attributes:
      label: Skill ID
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What went wrong?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior