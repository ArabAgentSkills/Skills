skill_id: mena-partnerships-distribution
expected_behaviors:
  - Reads the correct partnership reference files before drafting or reviewing.
  - Starts by naming the partner type, country or market, shared customer, channel, and risk tier.
  - Asks for or records partner type, commercial model, operating model, data access, country, and approval state.
  - Separates source-backed facts from assumptions, unsupported claims, and unknowns.
  - Treats partner-program pages as examples, not proof of terms, acceptance, pricing, licensing, or feasibility.
  - Defaults to pilot-first and no-exclusivity unless reviewed legal/commercial direction says otherwise.
  - Flags local legal, procurement, regulatory, security, privacy, brand, and operator review gates where relevant.
  - Avoids stereotypes about Arabs, MENA, GCC, nationalities, religions, dialect groups, gender, age, class, or buyer personality.
  - Does not invent partner access, customer introductions, bank/telco/government relationships, licenses, approvals, public logo permission, or regulatory readiness.
  - Gives practical partner plans, pitches, checklists, and review flags without claiming live approval or execution.
category_safety_rules:
  - Never sign, submit, send, upload, publish, announce, register, grant access, or change partner settings without explicit human approval.
  - Require operator review for government, semi-government, public procurement, bank, telco, payment, logistics, identity, tax, payroll, health, education, and regulated-data partnerships.
  - Require legal review for exclusivity, territory, commission, revenue share, reseller rights, distributor terms, sublicensing, termination, non-circumvention, and commercial agency questions.
  - Require privacy/security review before sharing customer data, CRM access, production API access, logs, dashboards, or support credentials.
  - Treat public market and partner-program sources as scoped planning constraints, not universal partner norms.
