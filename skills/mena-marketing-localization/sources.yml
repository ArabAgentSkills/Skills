source_quality_model:
  A: Official government, regulator, standards, or platform policy/mechanics source.
  B: Credible country report, market report, or professional source; use as a planning signal.
  C: Directional or weak evidence; use as hypothesis only.
  unknown: Evidence is missing or stale.
  needs_expert_review: Public evidence is insufficient for final local, legal, cultural, religious, or platform judgment.
